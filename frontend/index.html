<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학생 성적 관리 시스템</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <h1>학생 성적 관리 시스템</h1>
  <a href="index.html" class="active">홈</a>
  <a href="register.html">학생 등록</a>
  <a href="scores.html">성적 입력</a>
  <a href="view.html">결과 조회</a>
</nav>

<div class="container">
  <div class="card">
    <h2>안녕하세요 👋</h2>
    <p>학생 정보와 과목별 점수를 등록·관리하고, 평균과 등급을 자동 계산해 조회할 수 있는 시스템입니다.</p>
    <br>
    <h3>주요 기능</h3>
    <ul style="margin-left: 1.5rem; line-height: 1.8;">
      <li><strong>학생 등록</strong> — 학번·이름·학과·학년을 입력해 학생을 등록</li>
      <li><strong>성적 입력</strong> — 등록된 학생에게 과목별 점수(0~100)를 입력</li>
      <li><strong>결과 조회</strong> — 학생의 과목별 점수·등급과 평균·전체 등급 확인</li>
    </ul>
    <br>
    <h3>등급 기준 (절대평가 5단계)</h3>
    <p>
      <span class="grade grade-A">A</span> 90점 이상 &nbsp;
      <span class="grade grade-B">B</span> 80~89점 &nbsp;
      <span class="grade grade-C">C</span> 70~79점 &nbsp;
      <span class="grade grade-D">D</span> 60~69점 &nbsp;
      <span class="grade grade-F">F</span> 60점 미만
    </p>
  </div>
</div>

</body>
</html>
