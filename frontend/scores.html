<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>성적 입력 — 학생 성적 관리 시스템</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <h1>학생 성적 관리 시스템</h1>
  <a href="index.html">홈</a>
  <a href="register.html">학생 등록</a>
  <a href="scores.html" class="active">성적 입력</a>
  <a href="view.html">결과 조회</a>
</nav>

<div class="container">
  <div id="msg" class="message"></div>

  <div class="card">
    <h2>성적 입력</h2>
    <div class="form-row">
      <label for="studentSelect">학생</label>
      <select id="studentSelect">
        <option value="">학생을 선택하세요</option>
      </select>
    </div>
    <div class="form-row">
      <label for="subjectSelect">과목</label>
      <select id="subjectSelect">
        <option value="">과목을 선택하세요</option>
      </select>
    </div>
    <div class="form-row">
      <label for="score">점수</label>
      <input type="number" id="score" min="0" max="100" placeholder="0~100">
    </div>
    <button onclick="onSubmit()">입력</button>
  </div>

  <div class="card">
    <h3>현재 선택된 학생의 점수</h3>
    <table>
      <thead>
        <tr>
          <th>과목</th>
          <th>점수</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="scoreList">
        <tr><td colspan="3" class="text-center text-muted">학생을 선택하면 표시됩니다.</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/scores.js"></script>
</body>
</html>
