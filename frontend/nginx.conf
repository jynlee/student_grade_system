# =============================================================================
# 프론트엔드 nginx 설정 — 정적 파일 서빙 + /api 리버스 프록시
# -----------------------------------------------------------------------------
# 브라우저가 같은 origin(localhost:8080)으로 모든 요청을 보낼 수 있게 만든다.
# /api/*  →  backend 컨테이너(Tomcat, 8080) 로 프록시
# 그 외 경로 → /usr/share/nginx/html 정적 파일
#
# 효과:
#  - CORS 우회 불필요 (백엔드의 Access-Control-Allow-Origin: * 는 보험으로 유지)
#  - frontend/js/api.js 의 API_BASE를 상대경로 "/api" 로 사용 가능
#  - 배포 시 호스트/도메인이 바뀌어도 코드 수정 불필요
# =============================================================================

server {
    listen 80;
    server_name _;

    # ---- 정적 파일 ----
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 백엔드 API 리버스 프록시 ----
    # 호스트명 "backend" 는 docker-compose 의 서비스명 (내부 DNS).
    # 컨테이너 안 Tomcat은 8080 포트에서 listen.
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 백엔드 응답이 느릴 때 대비 (Maven 의존성 캐싱 후엔 빠름)
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
