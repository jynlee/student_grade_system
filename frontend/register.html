<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학생 등록 — 학생 성적 관리 시스템</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <h1>학생 성적 관리 시스템</h1>
  <a href="index.html">홈</a>
  <a href="register.html" class="active">학생 등록</a>
  <a href="scores.html">성적 입력</a>
  <a href="view.html">결과 조회</a>
</nav>

<div class="container">
  <div id="msg" class="message"></div>

  <div class="card">
    <h2>학생 등록</h2>
    <div class="form-row">
      <label for="studentNumber">학번</label>
      <input type="text" id="studentNumber" placeholder="예: 20240001" maxlength="20">
    </div>
    <div class="form-row">
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="예: 김철수" maxlength="50">
    </div>
    <div class="form-row">
      <label for="department">학과</label>
      <input type="text" id="department" placeholder="예: 컴퓨터공학과" maxlength="50">
    </div>
    <div class="form-row">
      <label for="gradeYear">학년</label>
      <select id="gradeYear">
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
        <option value="4">4학년</option>
      </select>
    </div>
    <button onclick="onRegister()">등록</button>
  </div>

  <div class="card">
    <h2>등록된 학생 목록</h2>
    <table>
      <thead>
        <tr>
          <th>학번</th>
          <th>이름</th>
          <th>학과</th>
          <th>학년</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="studentList">
        <tr><td colspan="5" class="text-center text-muted">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>
</body>
</html>
